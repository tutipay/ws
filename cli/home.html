<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Chat Example</title>
    <script type="text/javascript">
      window.onload = function () {
        var conn;
        var msg = document.getElementById("msg");
        var log = document.getElementById("log");

        function appendLog(item) {
          var doScroll =
            log.scrollTop > log.scrollHeight - log.clientHeight - 1;
          log.appendChild(item);
          if (doScroll) {
            log.scrollTop = log.scrollHeight - log.clientHeight;
          }
        }

        document.getElementById("form").onsubmit = function () {
          if (!conn) {
            return false;
          }
          if (!msg.value) {
            return false;
          }
          conn.send(msg.value);
          var value = JSON.parse(msg.value)
          var item = document.createElement("div");
          item.innerText = `[Your ID:${userID}] Sent: ${value.text}`;
          appendLog(item);
          msg.value = "";
          return false;
        };

        let queryParams = new URLSearchParams(window.location.search);

        let tenantID = queryParams.get("tenantID");
        let userID = queryParams.get("userID");

        if (window["WebSocket"]) {
          conn = new WebSocket(
            `ws://${document.location.host}/ws?tenantID=${tenantID}&userID=${userID}`
          );
          conn.onclose = function (evt) {
            var item = document.createElement("div");
            item.innerHTML = "<b>Connection closed.</b>";
            appendLog(item);
          };
          conn.onmessage = function (evt) {
            var response = JSON.parse(evt.data)
            var delivered = [];
            for (var i = 0; i < (response.messages || []).length; i++) {
              var item = document.createElement("div");
              item.innerText = response.messages[i].text;
              item.innerText = `[From:${response.messages[i].from_user_id}] Rcvd: ${item.innerText}`;
              appendLog(item);
              if (response.messages[i].type === "message") {
                delivered.push(response.messages[i].id);
              }
            }
            if (delivered.length > 0) {
              conn.send(JSON.stringify({type: "ack", message_ids: delivered}));
            }
          };
        } else {
          var item = document.createElement("div");
          item.innerHTML = "<b>Your browser does not support WebSockets.</b>";
          appendLog(item);
        }
      };
    </script>
    <style type="text/css">
      html {
        overflow: hidden;
      }

      body {
        overflow: hidden;
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
        background: gray;
      }

      #log {
        background: white;
        margin: 0;
        padding: 0.5em 0.5em 0.5em 0.5em;
        position: absolute;
        top: 0.5em;
        left: 0.5em;
        right: 0.5em;
        bottom: 3em;
        overflow: auto;
      }

      #form {
        padding: 0 0.5em 0 0.5em;
        margin: 0;
        position: absolute;
        bottom: 1em;
        left: 0px;
        width: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="log"></div>
    <form id="form">
      <input type="submit" value="Send" />
      <input type="text" id="msg" size="64" autofocus />
    </form>
  </body>
</html>
